version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/youruser/my-project/gen/go 
plugins:
  # Go
  - remote: buf.build/protocolbuffers/go:v1.31.0
    out: payment-service/gen/go
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.11.0
    out: payment-service/gen/go
    opt: paths=source_relative

  # TypeScript
  - remote: buf.build/bufbuild/es:v1.10.0
    out: payment-gateway/gen/ts
    opt: target=ts
  - remote: buf.build/connectrpc/es:v1.6.1
    out: payment-gateway/gen/ts
    opt: target=ts